<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0e2b63" />
    <title>Promolocation Offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(0, 177, 235, 0.18), transparent 28%),
          linear-gradient(180deg, #f8fbff 0%, #eef5fc 100%);
        color: #12263a;
      }

      .offline-card {
        width: min(100%, 420px);
        padding: 28px 24px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.98);
        border: 1px solid rgba(18, 38, 58, 0.08);
        box-shadow: 0 18px 48px rgba(15, 23, 42, 0.08);
        text-align: center;
      }

      .offline-card img {
        width: 96px;
        height: 96px;
        border-radius: 24px;
      }

      .eyebrow {
        margin: 18px 0 8px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-size: 12px;
        font-weight: 700;
        color: #0f766e;
      }

      h1 {
        margin: 0;
        font-size: 30px;
        line-height: 1.1;
        color: #0e2b63;
      }

      p {
        margin: 14px 0 0;
        line-height: 1.65;
        color: #4b5563;
      }
    </style>
  </head>
  <body>
    <main class="offline-card">
      <img alt="Promolocation" src="/pwa-icon-192.png" />
      <p class="eyebrow">Offline Mode</p>
      <h1>You’re offline</h1>
      <p>
        Promolocation will reconnect when your network returns. If you have
        already opened the app before, the last cached screens and activation
        zones may still be available.
      </p>
    </main>
  </body>
</html>
